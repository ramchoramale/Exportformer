<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exporter Details</title>
<link rel="stylesheet" href="exportersdetails.css">
</head>

<body>

<div class="container">

<h1>Exporter Details</h1>

<form id="exporterForm">

<label>Exporter Name</label>
<input type="text" id="name" required>

<label>Company Name</label>
<input type="text" id="company" required>

<label>Country</label>
<input type="text" id="country" required>

<label>Product Exported</label>
<input type="text" id="product" required>

<label>Address</label>
<input type="text" id="address" required>

<label>Phone Number</label>
<input type="number" id="phone" required>

<button type="submit">Add Exporter</button>

</form>

<h2>Exporters List</h2>

<table id="exporterTable">

<thead>
<tr>
<th>Name</th>
<th>Company</th>
<th>Country</th>
<th>Product</th>
<th>Email</th>
<th>Phone</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

</div>

<script src="exportersdetails.js"></script>

</body>
</html>
